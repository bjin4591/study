<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliana's ISEE Prep</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 40px;
            color: #333;
        }

        h1 {
            color: #d9383a;
            font-size: 24px;
            margin-bottom: 20px;
        }

        /* Top Row styling */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .todo-container {
            border: 2px solid #0099ff;
            padding: 8px 15px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }

        .todo-label {
            color: #d9383a;
            font-weight: bold;
            margin-right: 5px;
        }
        .radio-todo-label {
            color: #2b3bb5;
            font-size: 14px;
            //font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .radio-label {
            color: #2b3bb5;
            font-size: 18px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .go-btn {
            border: 2px solid #d9383a;
            background: white;
            color: #d9383a;
            font-weight: bold;
            padding: 8px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 2px;
        }

        .go-btn:hover {
            background-color: #fdf2f2;
        }

        .str_lbl:hover {
            background-color: #fdf2f2;
        }
        /* Pop up */
        dialog {
            width: 80%;
            max-width: 650px;
            font-family: Arial, sans-serif;
            font-size: 16px;
            line-height: 1.5;
            padding: 25px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        /* Style for the dynamic first line */
        #popHeader {
            font-size: 20px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        #content {
            white-space: pre-wrap;
            margin-bottom: 20px;
        }
        button {
            float: center;
            padding: 6px 20px;
        }
        /* Subjects Section styling */
        .subject-group {
            margin-bottom: 25px;
        }
        .subject-title {
            color: #d9383a;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-left: 20px;
        }
        /* Strategy label */
        .str_hdr {
            color: #2b3bb5;
            font-size: 15px;
            margin-left: 45px;
        }
        .str_lbl {
            color: #2b3bb5;
            font-size: 15px;
            margin-left: 60px;
        }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 40px;">Eliana's Drinking the ISEE</h1>
    
    <form id="studyForm">
        <!-- Top Parameter Bar -->
        <div class="top-bar">
            <div class="todo-container">
                <span class="todo-label">To Do:</span>
                <label class="radio-todo-label">
                    <input type="radio" name="todo" value="1" checked> New
                </label>
                <label class="radio-todo-label">
                    <input type="radio" name="todo" value="2"> Wrong
                </label>
                <label class="radio-todo-label">
                    <input type="radio" name="todo" value="3"> New + Wrong
                </label>
                <label class="radio-todo-label">
                    <input type="radio" name="todo" value="4"> Done
                </label>
                <label class="radio-todo-label">
                    <input type="radio" name="todo" value="5"> All
                </label>
            </div>

            <button type="submit" class="go-btn">Go</button>
        </div>

        <!-- Subject Radio Group (All of them share the name "subjectUrl" to form a single group) -->
        
        <!-- Verbal Reasoning -->
        <div class="subject-group">
            <div class="subject-title">Verbal Reasoning</div>
            <div class="options-list">

                <label class="radio-label">
                    <input type="radio" name="subjectUrl" value="vp.html?grp=1" checked> Synonyms and Words
                </label>
                <div class="str_hdr" >(Suggested Strategies)</div>
                <label id="strategy_1_1" class="str_lbl" onclick="showStrategy(1, 1)" ></label>
                <label id="strategy_1_2" class="str_lbl" onclick="showStrategy(1, 2)" ></label>
                <label id="strategy_1_3" class="str_lbl" onclick="showStrategy(1, 3)" ></label>
                <label id="strategy_1_4" class="str_lbl" onclick="showStrategy(1, 4)" ></label>
                <label id="strategy_1_5" class="str_lbl" onclick="showStrategy(1, 5)" ></label>

                <label class="radio-label">
                    <input type="radio" name="subjectUrl" value="vp.html?grp=2"> Sentence Completion
                </label>
            </div>
        </div>

        <!-- Quantitative Reasoning -->
        <div class="subject-group">
            <div class="subject-title">Quantitative Reasoning</div>
            <div class="options-list">
                <label class="radio-label">
                    <input type="radio" name="subjectUrl" value="http://my_web/q2.html" > ??????
                </label>
                <label class="radio-label">
                    <input type="radio" name="subjectUrl" value="http://my_web/sentence.comp.html"> ??????
                </label>
            </div>
        </div>

        <!-- Reading Comprehension -->
        <div class="subject-group">
            <div class="subject-title">Reading Comprehension</div>
            <div class="options-list">
                <label class="radio-label">
                    <input type="radio" name="subjectUrl" value="http://my_web/description.html"> ??????
                </label>
                <label class="radio-label">
                    <input type="radio" name="subjectUrl" value="http://my_web/argument.html"> ??????
                </label>
            </div>
        </div>

        <!-- Math -->
        <div class="subject-group">
            <div class="subject-title">Mathematics Achievement</div>
            <div class="options-list">
                <label class="radio-label">
                    <input type="radio" name="subjectUrl" value="http://my_web/simple.arith.html"> ??????
                </label>
                <label class="radio-label">
                    <input type="radio" name="subjectUrl" value="http://my_web/simple.geom.html"> ??????
                </label>
            </div>
        </div>



    </form>

    <dialog id="pop">
        <h2 id="popHeader"></h2>
        <div id="content"></div>
        <button onclick="pop.close()">Close</button>
    </dialog>

    <script>

        let records = null;

        async function getRecords ()
        {
            const SUPABASE_URL = 'https://olvahkxlvzfrcowlysac.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_1NW2UZDMNzN-mC9rYLNZbg_KbS-H-Hx';
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const { data, error } = await supabaseClient
              .from('strategy')
              .select('grp,id,name,detail,seq'); 

            if (!error && data && data.length > 0) {
                records = data;
            }
            else {
                console.log("Got no records for Strategy");
            }

            /* Populate the strategy radiobutton labels */
            let fld = " ";
            for (const record of records) {
                fld = 'strategy_' + record.grp + '_' + record.id;
                document.getElementById(fld).textContent = record.name;
            }

       }

       function showStrategy(in_grp, in_id) 
       {


           let detail = " ";
           for (const record of records) {
               if (record.grp == in_grp && record.id == in_id) {
                   const rawTxt = record.detail;
                   detail = rawTxt.replace(/\\n/g, '\n');
                   break; 
               }
           }

        const firstLineBreak = detail.indexOf('\n');
        if (firstLineBreak > 0) {
          popHeader.innerText = detail.substring(0, firstLineBreak).trim();
          content.innerText = detail.substring(firstLineBreak).trim();
        } else {
          popHeader.innerText = "Strategy Note";
          content.innerText = detail;
        }
        
        pop.showModal();

        }

        document.getElementById('studyForm').addEventListener('submit', function(event) {
            // Prevent the default form submission page reload
            event.preventDefault();

            // Get the selected "To Do" parameter value (1, 2, 3, or 4)
            const selectedTodo = document.querySelector('input[name="todo"]:checked').value;

            // Get the selected subject URL
            const selectedUrl = document.querySelector('input[name="subjectUrl"]:checked').value;

            // Construct the final URL with the "todo" parameter appended
            const finalDestination = `/study/${selectedUrl}&todo=${selectedTodo}`;

            // Open the constructed URL in a new browser tab
            window.open(finalDestination, '_self');
        });

        getRecords();

    </script>

</body>
</html>
